server.port=8000

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/esprit_connect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Tunis&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.access-expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:4200

# AI (Groq)
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=llama-3.3-70b-versatile

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_HOST_USER:}
spring.mail.password=${EMAIL_HOST_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=http://localhost:4200
